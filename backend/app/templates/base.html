<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitch Visualizer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #0a0a0a;
      -webkit-font-smoothing: antialiased;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    
    header {
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: white;
      z-index: 50;
    }
    
    .logo { font-weight: 800; font-size: 16px; letter-spacing: -0.02em; }
    .logo-subtitle { font-size: 11px; color: #a0a0a0; text-transform: uppercase; letter-spacing: 0.04em; }
    
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; margin: 0 0 16px; }
    p { color: #6b6b6b; font-size: 15px; line-height: 1.6; margin: 0 0 32px; }
    
    .card {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px;
      background: #fafafa;
      margin-bottom: 32px;
    }
    
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    input[type="text"], input[type="password"], textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: #0a0a0a; }
    
    .btn {
      background: #0a0a0a;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      text-decoration: none;
    }
    .btn:hover { background: #333; }
    .btn:disabled { background: #a0a0a0; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div>
        <div class="logo">Pitch Visualizer</div>
        <div class="logo-subtitle">AI Storyboard Engine</div>
      </div>
    </div>
  </header>
  
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
